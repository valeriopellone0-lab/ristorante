# Workflow per il deploy automatico su GitHub Pages
name: Deploy su GitHub Pages

on:
  # Esegui il build ad ogni push sulla branch principale (main o master)
  push:
    branches: ["main", "master"]

  # Consente di avviare il workflow manualmente dalla scheda Actions di GitHub
  workflow_dispatch:

# Permessi necessari per pubblicare su GitHub Pages tramite Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Consente una sola esecuzione simultanea del deploy per evitare conflitti
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione di Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installazione dipendenze
        run: npm ci || npm install

      - name: Build del progetto
        run: npm run build

      - name: Configurazione automatica di Pages
        uses: actions/configure-pages@v5

      - name: Caricamento dell'output compilato (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy effettivo su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
